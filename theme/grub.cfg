set timeout=30
set default=0

# Load theme
set theme=/boot/grub/themes/nexus/theme.txt
export theme

# Menu entries
menuentry "NexusUSB - Start Live Environment" {
    linux /live/vmlinuz boot=live components quiet splash
    initrd /live/initrd
}

menuentry "NexusUSB - Safe Mode (nomodeset)" {
    linux /live/vmlinuz boot=live components nomodeset quiet splash
    initrd /live/initrd
}

menuentry "Hiren's BootCD PE - Windows Tools Environment" {
    set isofile="/ISOs/Rescue/hirens-bootcd-pe.iso"
    loopback loop $isofile
    linux (loop)/boot/vmlinuz boot=live fromiso=$isofile
    initrd (loop)/boot/initrd
}

menuentry "NexusUSB - Persistent Mode" {
    linux /live/vmlinuz boot=live components persistent quiet splash
    initrd /live/initrd
}

submenu "Additional Rescue ISOs >" {
    menuentry "SystemRescue" {
        set isofile="/ISOs/Rescue/systemrescue.iso"
        loopback loop $isofile
        linux (loop)/sysresccd/boot/x86_64/vmlinuz archisobasedir=sysresccd img_dev=/dev/disk/by-uuid/YOUR-UUID img_loop=$isofile
        initrd (loop)/sysresccd/boot/intel_ucode.img (loop)/sysresccd/boot/amd_ucode.img (loop)/sysresccd/boot/x86_64/sysresccd.img
    }
    
    menuentry "Clonezilla Live" {
        set isofile="/ISOs/Rescue/clonezilla.iso"
        loopback loop $isofile
        linux (loop)/live/vmlinuz boot=live union=overlay username=user config components quiet noswap edd=on nomodeset locales= keyboard-layouts= ocs_live_run="ocs-live-general" ocs_live_extra_param="" ocs_live_batch=no net.ifnames=0 nosplash noprompt findiso=$isofile
        initrd (loop)/live/initrd.img
    }
    
    menuentry "GParted Live" {
        set isofile="/ISOs/Rescue/gparted.iso"
        loopback loop $isofile
        linux (loop)/live/vmlinuz boot=live union=overlay username=user config components quiet noswap ip= net.ifnames=0 findiso=$isofile
        initrd (loop)/live/initrd.img
    }
    
    menuentry "Kaspersky Rescue Disk" {
        set isofile="/ISOs/Antivirus/kaspersky-rescue.iso"
        loopback loop $isofile
        linux (loop)/boot/grub/k-x86_64 net.ifnames=0 lang=en dostartx
        initrd (loop)/boot/grub/initrd.xz
    }
}

menuentry "Memory Test (Memtest86+)" {
    linux16 /boot/memtest86+.bin
}

menuentry "Boot from First Hard Disk" {
    set root=(hd0)
    chainloader +1
}

menuentry "Reboot" {
    reboot
}

menuentry "Power Off" {
    halt
}
