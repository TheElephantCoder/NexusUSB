# Windows PE Integration for NexusUSB
# This configures how Windows tools are accessed

# Hiren's BootCD PE ISO
# Download from: https://www.hirensbootcd.org/
HIRENS_ISO_URL="https://www.hirensbootcd.org/files/HBCD_PE_x64.iso"
HIRENS_ISO_NAME="hirens-bootcd-pe.iso"
HIRENS_ISO_SIZE="1.5GB"

# Windows PE Tools Access
# These tools run best in Windows PE environment
WINDOWS_PE_TOOLS=(
    "Malwarebytes"
    "AdwCleaner"
    "Kaspersky Virus Removal Tool"
    "Norton Power Eraser"
    "McAfee Stinger"
    "HitmanPro"
    "Emsisoft Emergency Kit"
    "Dr.Web CureIt"
    "Comodo Cleaning Essentials"
)

# Tools that work in both Linux (Wine) and Windows PE
CROSS_PLATFORM_TOOLS=(
    "7-Zip"
    "Notepad++"
    "CPU-Z"
    "GPU-Z"
    "CrystalDiskInfo"
)

# Partition Layout
# Partition 3: Windows Tools (NTFS, 8GB)
# - Accessible from Windows PE
# - Accessible from regular Windows
# - Contains portable Windows applications

# Boot Menu Integration
# GRUB menu includes:
# 1. NexusUSB Live (Linux)
# 2. Hiren's BootCD PE (Windows PE)
# 3. ISO Collection (Other rescue discs)

# Usage Instructions
# ==================
# 
# To use Malwarebytes:
# 1. Boot NexusUSB
# 2. Select "Hiren's BootCD PE" from GRUB menu
# 3. Wait for Windows PE to load
# 4. Open File Explorer
# 5. Navigate to NexusUSB partition (D: or E:)
# 6. Go to Windows-Tools\Antivirus\
# 7. Run Malwarebytes
# 8. Scan C: drive (infected Windows)
# 9. Remove threats
# 10. Reboot to Windows

# Alternative: Boot regular Windows
# 1. Boot into Windows normally
# 2. Insert NexusUSB USB
# 3. Navigate to Windows-Tools folder
# 4. Run tools directly
# Note: Less effective as malware is running

# Network Access in Windows PE
# ============================
# Hiren's BootCD PE includes network drivers
# Can connect to internet for:
# - Updating antivirus definitions
# - Downloading additional tools
# - Remote support access

# Recommended Scanning Workflow
# ==============================
# 1. Scan with ClamAV in Linux (fast, safe)
# 2. Scan with Malwarebytes in Windows PE (thorough)
# 3. Scan with Windows Defender in regular Windows (verification)
# Total time: 2-3 hours for complete cleaning
